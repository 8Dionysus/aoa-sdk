name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e '.[dev]' build

      - name: Run tests
        run: python -m pytest -q

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run mypy
        run: python -m mypy src

      - name: Build package
        run: python -m build

      - name: Checkout abyss-machine verifier
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/abyss-machine
          path: .abyss-machine-verifier

      - name: Validate OS Abyss artifact bundle
        env:
          ABYSS_MACHINE_REPO_ROOT: .abyss-machine-verifier
        run: python mechanics/release-support/parts/release-audit-publish-helper/scripts/validate_abyss_machine_package_artifact_bundle.py

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: aoa-sdk-dist-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error
