name: Repo Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release_audit:
    name: Repo Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Check repo-local KAG source index
        uses: 8Dionysus/aoa-kag/.github/actions/repo-local-kag-index@68891c232ff6f5ab3c0a40c4a68f7f373c51aab4

      - name: Checkout abyss-machine verifier
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/abyss-machine
          path: .abyss-machine-verifier

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e '.[dev]' build

      - name: Run release audit
        env:
          ABYSS_MACHINE_REPO_ROOT: .abyss-machine-verifier
        run: python scripts/release_check.py
