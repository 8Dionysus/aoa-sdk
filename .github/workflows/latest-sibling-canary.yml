name: Latest Sibling Canary

on:
  schedule:
    - cron: "17 6 * * 2,5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aoa-sdk
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          path: workspace/aoa-sdk

      - name: Checkout aoa-routing
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-routing
          path: workspace/aoa-routing

      - name: Checkout aoa-playbooks
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-playbooks
          path: workspace/aoa-playbooks

      - name: Checkout aoa-skills
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-skills
          path: workspace/aoa-skills

      - name: Checkout aoa-techniques
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-techniques
          path: workspace/aoa-techniques

      - name: Checkout aoa-evals
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-evals
          path: workspace/aoa-evals

      - name: Checkout aoa-memo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-memo
          path: workspace/aoa-memo

      - name: Checkout aoa-agents
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-agents
          path: workspace/aoa-agents

      - name: Checkout aoa-kag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-kag
          path: workspace/aoa-kag

      - name: Checkout aoa-stats
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-stats
          path: workspace/aoa-stats

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: workspace/aoa-sdk
        run: python -m pip install -e '.[dev]'

      - name: Run sibling canary
        working-directory: workspace/aoa-sdk
        run: python scripts/run_sibling_canary.py --repo-root . --matrix scripts/sibling_canary_matrix.json
